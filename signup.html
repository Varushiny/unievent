<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - UniEvent</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
    }
  </style>
</head>
<body>
  <!-- Page Loader -->
  <div class="page-loader">
    <div class="spinner"></div>
  </div>

  <!-- Particle background canvas -->
  <canvas id="particles-canvas"></canvas>
  <div class="bg-pattern-fade"></div>

  <!-- Background Orbs -->
  <div class="floating-orb orb-1"></div>
  <div class="floating-orb orb-2"></div>
  <div class="floating-orb orb-3"></div>

  <!-- Top Navigation Link -->
  <div style="position: absolute; top: 24px; left: 24px;">
    <a href="index.html" style="font-weight:600; font-size: 1.1rem; color: var(--primary-color);">🏫 Uni<span>Event</span></a>
  </div>

  <!-- Signup Card Container -->
  <div class="glass-card fade-in" style="max-width: 580px; width: 100%; border-radius: var(--radius-lg); text-align: center; border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 20px 50px -10px rgba(30, 64, 175, 0.1);">
    <h2 style="font-size: 1.75rem; margin-bottom: 8px; font-weight: 700;">Join UniEvent</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px;">Create your profile to join clubs and attend campus events</p>

    <!-- Sign Up Form -->
    <form id="signup-form">
      <div class="form-row">
        <div class="form-group">
          <label for="signup-name" class="form-label">Full Name</label>
          <input type="text" id="signup-name" class="form-control" placeholder="Alex Mercer" required>
        </div>
        <div class="form-group">
          <label for="signup-id" class="form-label">Student ID</label>
          <input type="text" id="signup-id" class="form-control" placeholder="ST-2026-999" required>
        </div>
      </div>

      <div class="form-group">
        <label for="signup-email" class="form-label">Email Address</label>
        <input type="email" id="signup-email" class="form-control" placeholder="name@unievent.com" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="signup-faculty" class="form-label">Faculty</label>
          <select id="signup-faculty" class="form-control" style="cursor: pointer;">
            <option value="Engineering">Engineering</option>
            <option value="Science">Science</option>
            <option value="Business">Business Administration</option>
            <option value="Arts">Humanities & Arts</option>
          </select>
        </div>
        <div class="form-group">
          <label for="signup-dept" class="form-label">Department</label>
          <input type="text" id="signup-dept" class="form-control" placeholder="Computer Science" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="signup-pass" class="form-label">Password</label>
          <input type="password" id="signup-pass" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label for="signup-confirm-pass" class="form-label">Confirm Password</label>
          <input type="password" id="signup-confirm-pass" class="form-control" placeholder="••••••••" required>
        </div>
      </div>

      <!-- Password Strength Indicator -->
      <div style="text-align: left; margin-top: -12px; margin-bottom: 24px;">
        <div style="display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 6px; font-weight: 500;">
          <span style="color: var(--text-muted);">Password Strength:</span>
          <span id="strength-label" style="color: var(--danger-color);">Too Short</span>
        </div>
        <div style="background: rgba(226, 232, 240, 0.8); border-radius: 3px; height: 6px; width: 100%;">
          <div id="strength-indicator" class="strength-bar" style="width: 0%; background-color: var(--danger-color);"></div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-animate" style="width: 100%; margin-bottom: 24px; font-weight: 600;">
        Create Account
      </button>

      <p style="font-size: 0.9rem; color: var(--text-muted);">
        Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Sign In instead</a>
      </p>
    </form>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if logged in
      if (db.getCurrentUser()) {
        window.location.href = 'dashboard.html';
        return;
      }

      const form = document.getElementById('signup-form');
      const passInput = document.getElementById('signup-pass');
      const confirmInput = document.getElementById('signup-confirm-pass');
      const strengthLabel = document.getElementById('strength-label');
      const strengthBar = document.getElementById('strength-indicator');

      // Password Strength live monitoring
      passInput.addEventListener('input', () => {
        const val = passInput.value;
        let score = 0;
        
        if (val.length >= 6) score++;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        let width = '0%';
        let color = 'var(--danger-color)';
        let label = 'Too Short';

        if (val.length > 0) {
          if (score <= 1) {
            width = '20%';
            color = 'var(--danger-color)';
            label = 'Weak';
          } else if (score <= 3) {
            width = '60%';
            color = 'var(--warning-color)';
            label = 'Moderate';
          } else {
            width = '100%';
            color = 'var(--success-color)';
            label = 'Strong';
          }
        }

        strengthBar.style.width = width;
        strengthBar.style.backgroundColor = color;
        strengthLabel.innerText = label;
        strengthLabel.style.color = color;
      });

      // Submit Form
      form.addEventListener('submit', (e) => {
        e.preventDefault();

        const name = document.getElementById('signup-name').value.trim();
        const id = document.getElementById('signup-id').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const faculty = document.getElementById('signup-faculty').value;
        const dept = document.getElementById('signup-dept').value.trim();
        const pass = passInput.value;
        const confirmPass = confirmInput.value;

        if (pass !== confirmPass) {
          showToast('Passwords do not match!', 'error');
          return;
        }

        if (pass.length < 6) {
          showToast('Password must be at least 6 characters long', 'error');
          return;
        }

        // Check exists
        let users = db.get('uni_users', []);
        const exists = users.some(u => u.email.toLowerCase() === email.toLowerCase());

        if (exists) {
          showToast('User email already registered', 'error');
          return;
        }

        // Create user
        const newUser = {
          id: 'usr-' + Date.now(),
          name,
          studentId: id,
          email,
          password: pass,
          faculty,
          department: dept,
          role: 'student', // default signed up role
          avatar: ''
        };

        users.push(newUser);
        db.set('uni_users', users);
        
        // Log in
        db.setCurrentUser(newUser);

        // Add activity
        let activities = db.get('uni_activities', []);
        activities.push({
          studentId: newUser.id,
          type: 'club_join', // generic joining activity
          text: `Created user profile and joined UniEvent`,
          time: new Date().toISOString()
        });
        db.set('uni_activities', activities);

        showToast('Registration successful! Redirecting...', 'success');

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      });
    });
  </script>
</body>
</html>
