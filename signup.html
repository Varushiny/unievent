<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - UniEvent</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
    }
  </style>
</head>
<body>


  <!-- Top Navigation Link -->
  <div style="position: absolute; top: 24px; left: 24px;">
    <a href="index.html" style="font-weight:600; font-size: 1.1rem; color: var(--primary-color);">🏫 Uni<span>Event</span></a>
  </div>

  <!-- Signup Card Container -->
  <div class="glass-card fade-in" style="max-width: 580px; width: 100%; border-radius: var(--radius-lg); text-align: center; border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 20px 50px -10px rgba(30, 64, 175, 0.1);">
    <h2 style="font-size: 1.75rem; margin-bottom: 8px; font-weight: 700;">Join UniEvent</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px;">Create your profile to attend campus events</p>

    <!-- Sign Up Form -->
    <form id="signup-form" action="actions/signup_process.php" method="POST">
      <!-- Error Message Placeholder -->
      <div id="signup-error" style="color: var(--danger-color); font-size: 0.9rem; margin-bottom: 16px; display: none;"></div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="signup-name" class="form-label">Full Name</label>
          <input type="text" id="signup-name" name="name" class="form-control" placeholder="Alex Mercer" required>
        </div>
        <div class="form-group">
          <label for="signup-id" class="form-label">Student ID</label>
          <input type="text" id="signup-id" name="student_id" class="form-control" placeholder="ST-2026-999" required>
        </div>
      </div>

      <div class="form-group">
        <label for="signup-email" class="form-label">Email Address</label>
        <input type="email" id="signup-email" name="email" class="form-control" placeholder="name@unievent.com" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="signup-faculty" class="form-label">Faculty</label>
          <select id="signup-faculty" name="faculty" class="form-control" style="cursor: pointer;">
            <option value="Engineering">Management</option>
            <option value="Science">Science</option>
            <option value="Business">Computing and Technology</option>
            <option value="Arts">Humanities</option>
          </select>
        </div>
        <div class="form-group">
          <label for="signup-dept" class="form-label">Department</label>
          <input type="text" id="signup-dept" name="department" class="form-control" placeholder="Computer Science" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="signup-pass" class="form-label">Password</label>
          <input type="password" id="signup-pass" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label for="signup-confirm-pass" class="form-label">Confirm Password</label>
          <input type="password" id="signup-confirm-pass" name="password_confirm" class="form-control" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 24px; font-weight: 600;">
        Create Account
      </button>

      <p style="font-size: 0.9rem; color: var(--text-muted);">
        Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Sign In instead</a>
      </p>
    </form>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
